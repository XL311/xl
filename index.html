  <style>
    :root{
      --bg:#f4f7fb;
      --panel:#ffffff;
      --panel-soft:rgba(255, 255, 255, .72);
      --primary:#1f6feb;
      --primary-strong:#0b5ad9;
      --accent:#2aa8ff;
      --text:#0b1b33;
      --muted:#4f6380;
      --shadow:0 12px 30px rgba(13, 50, 102, .12);
      --shadow-strong:0 18px 44px rgba(13, 50, 102, .18);
      --hover-shadow:0 10px 22px rgba(31,111,235,.22);
      --hover-border:rgba(31,111,235,.35);
      --radius:16px;
    }
    *{box-sizing:border-box}
    img{ -webkit-user-drag:none; user-select:none; }
    @media print{ body{ display:none !important; } }
    html,body{height:100%;}
    body{
      margin:0;
      background:
        radial-gradient(900px 500px at 10% -10%, rgba(31,111,235,.16), transparent 60%),
        radial-gradient(900px 500px at 110% 0%, rgba(42,168,255,.14), transparent 60%),
        linear-gradient(180deg, #f6f9ff 0%, #eef3fb 45%, #f7f9fc 100%);
      color:var(--text);
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans CJK SC", sans-serif;
      line-height:1.6;
      -webkit-tap-highlight-color: transparent;
    }
    canvas#bg-particles{position:fixed;inset:0;z-index:-1;opacity:.75;filter: blur(.2px);}
    body{ overflow:hidden; }
    .fixed-area{
      position:fixed;
      top:0; left:0; right:0;
      z-index:10;
      background: transparent;
    }
    .cards-scroll{
      position:fixed;
      left:0; right:0; bottom:0;
      overflow:auto;
      -webkit-overflow-scrolling: touch;
    }
    .top-bg{
      position:fixed;
      top:60px;
      left:0;
      right:0;
      height:320px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.15), rgba(255,255,255,.75) 70%),
        url('./images/bjbj.webp') center top/cover no-repeat;
      opacity:.85;
      z-index:-2;
      pointer-events:none;
      filter: saturate(1.05);
    }
    header{
      position:sticky; top:0; z-index:20;
      background:
        linear-gradient(180deg, rgba(220,232,250,.98), rgba(200,218,245,.9));
      backdrop-filter: blur(10px);
      border-bottom:1px solid rgba(15, 40, 90, .1);
      box-shadow: 0 10px 26px rgba(15, 40, 90, .08);
      position: relative;
      overflow: hidden;
    }
    header::before{
      content:"";
      position:absolute; inset:0;
      background:
        linear-gradient(120deg, rgba(31,111,235,.12), transparent 60%),
        repeating-linear-gradient(90deg, rgba(15,40,90,.08) 0 1px, transparent 1px 24px),
        repeating-linear-gradient(0deg, rgba(15,40,90,.06) 0 1px, transparent 1px 18px);
      opacity:.95;
      pointer-events:none;
    }
    header::after{
      content:"";
      position:absolute; left:0; right:0; bottom:0; height:2px;
      background: linear-gradient(90deg, transparent, rgba(31,111,235,.6), transparent);
      opacity:.8;
      pointer-events:none;
    }
    .nav{
      max-width:1200px; margin:0 auto; padding:10px 20px;
      display:flex; align-items:center; justify-content:space-between; gap:16px;
      position: relative; z-index: 1;
    }
    .brand{display:flex; align-items:center; gap:12px; font-weight:800; letter-spacing:.6px;}
    .brand .logo{
      width:38px; aspect-ratio:1/1; border-radius:50%;
      display:grid; place-items:center; color:#fff; font-weight:900;
      background: radial-gradient(circle at 30% 30%, rgba(42,168,255,.9), transparent 55%),
                  radial-gradient(circle at 70% 70%, rgba(31,111,235,.9), transparent 55%),
                  #0b4db8;
      box-shadow: var(--shadow);
    }
    .brand .title{font-size:18px; color:#0b1b33; text-shadow:0 2px 12px rgba(31,111,235,.18)}
    .nav-links{display:flex; gap:12px; flex-wrap:wrap}
    .nav-links a{
      color:#0b1b33; text-decoration:none; padding:9px 14px; border-radius:14px;
      border:1px solid rgba(15, 40, 90, .18);
      transition:.25s ease; font-weight:700; font-size:14px;
      background: #ffffff;
      box-shadow: 0 10px 20px rgba(15, 40, 90, .18);
      backdrop-filter: blur(6px);
    }
    .nav-links a:hover{ color:#0b1b33; border-color:var(--hover-border); box-shadow:var(--hover-shadow)}
    .carousel{ max-width:1200px; margin:2px auto 6px; padding:0 20px; }
    .carousel-wrap{ position:relative; border-radius:var(--radius); overflow:hidden; box-shadow: var(--shadow); border:1px solid rgba(15, 40, 90, .08); background:#fff; }
    .slide img{ opacity:.92; }
    .slides, .car-btn, .dots{ position:relative; z-index:1; }
    .slides{ display:flex; transition: transform .6s ease; }
    .slide{ min-width:100%; height:42vw; max-height:420px; background:#eaf1ff; position:relative; }
    .slide img{ width:100%; height:100%; object-fit:cover; display:block; opacity:.92; }
    .car-btn{ position:absolute; top:50%; transform:translateY(-50%); width:44px; height:44px; border-radius:50%; border:1px solid rgba(15, 40, 90, .12); background:rgba(255,255,255,.8); color:#0b1b33; display:grid; place-items:center; cursor:pointer; box-shadow:var(--shadow); transition: transform .42s cubic-bezier(.22,1,.36,1), background .34s cubic-bezier(.22,1,.36,1), box-shadow .42s cubic-bezier(.22,1,.36,1), border-color .34s cubic-bezier(.22,1,.36,1); }
    .car-btn:hover{ background:rgba(31,111,235,.12); box-shadow:var(--hover-shadow)}
    .car-prev{ left:12px; }
    .car-next{ right:12px; }
    .dots{ position:absolute; bottom:10px; left:0; right:0; display:flex; gap:8px; justify-content:center; }
    .dot{ width:10px; height:10px; border-radius:50%; background:rgba(15, 40, 90, .15); border:1px solid rgba(15, 40, 90, .2); cursor:pointer; transition: transform .46s cubic-bezier(.22,1,.36,1), background .34s cubic-bezier(.22,1,.36,1), box-shadow .34s cubic-bezier(.22,1,.36,1), border-color .34s cubic-bezier(.22,1,.36,1); }
    .dot.active{ background:var(--primary); box-shadow:0 0 12px rgba(31,111,235,.35); transform: scale(1.18); }
    .section{ max-width:1200px; margin:10px auto; padding:0 20px; }
    .section h2{ font-size:18px; margin:6px 0 6px; color:#0b1b33; text-shadow:none}
    .section-head{
      display:flex;
      justify-content:center;
      align-items:center;
      gap:12px;
      margin:6px 0 10px;
    }
    .category-tabs{
      display:flex;
      gap:6px;
      flex-wrap:wrap;
      align-items:center;
      padding:6px;
      border-radius:14px;
      background: linear-gradient(180deg, rgba(255,255,255,.82), rgba(245,250,255,.7));
      border:1px solid rgba(15, 40, 90, .08);
      box-shadow: 0 10px 22px rgba(31,111,235,.14);
    }
    .tab-btn{
      padding:6px 12px;
      border-radius:10px;
      border:1px solid rgba(15, 40, 90, .12);
      background: rgba(255,255,255,.9);
      color:#0b1b33;
      font-weight:700;
      font-size:12px;
      cursor:pointer;
      box-shadow: 0 4px 10px rgba(31,111,235,.1);
      transition: transform .22s ease, box-shadow .22s ease, border-color .22s ease;
    }
    .tab-btn.active{
      background: linear-gradient(90deg, var(--primary-strong), var(--accent));
      color:#fff;
      border-color: rgba(31,111,235,.35);
      box-shadow: 0 8px 16px rgba(31,111,235,.22);
      transform: translateY(-1px);
    }
    #cardsScroll .section h2{
      margin-top:2px;
      margin-bottom:4px;
    }
    .card-grid{ display:flex; flex-direction:column; gap:10px; }
    .card-row{
      position:relative;
      display:grid;
      grid-template-columns: repeat(4, minmax(0,1fr));
      gap:6px;
      padding:8px 10px;
      border-radius:16px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.92), rgba(245,250,255,.86));
      border:1px solid rgba(15, 40, 90, .08);
      box-shadow: 0 10px 22px rgba(31,111,235,.14);
    }
    .card{
      background: linear-gradient(180deg, rgba(255,255,255,.95), rgba(248,251,255,.95));
      border:1px solid rgba(15, 40, 90, .08);
      border-radius:12px; padding:6px 4px; display:flex; flex-direction:column; gap:4px; align-items:center; text-align:center;
      box-shadow: 0 6px 14px rgba(31,111,235,.12);
      transition: transform .25s ease, box-shadow .25s ease, border-color .25s ease;
      position: relative;
      overflow: hidden;
      text-decoration:none;
      color: inherit;
    }
    .card:hover{ transform: translateY(-4px); border-color: rgba(31,111,235,.25); box-shadow: var(--shadow-strong); }
    .avatar{ width:42px; height:42px; border-radius:10px; border:2px solid rgba(31,111,235,.18); box-shadow:0 6px 12px rgba(31,111,235,.16); flex: none; background:#eef4ff; object-fit:cover }
    .title{ font-weight:700; color:#0b1b33; font-size:11px; line-height:1.2; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:100% }
    .rating{ display:flex; gap:2px; align-items:center; font-size:8px; color:#f5a623; }
    .stars{ display:flex; gap:1px; }
    .stars svg{ width:10px; height:10px; fill:currentColor; }
    .score{ color:#0b1b33; font-size:9px; font-weight:600; margin-left:2px; }
    .rec-badge{
      position:absolute; top:4px; right:4px; z-index:2;
      background: linear-gradient(135deg, #ff4757, #ff6b81);
      border-radius:6px; padding:1px 5px;
    }
    .rec-badge-text{ color:#fff; font-size:8px; font-weight:800; }
    .desc-text{ color:var(--muted); font-size:9px; line-height:1.1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:100%; }
    .fab{ position:fixed; right:18px; bottom:18px; z-index:15; }
    .fab button{
      width:56px; height:56px; border-radius:50%; border:1px solid rgba(31,111,235,.25);
      background: radial-gradient(circle at 30% 30%, rgba(42,168,255,.9), transparent 55%), #0b4db8;
      color:#fff; font-weight:900; cursor:pointer; box-shadow: var(--shadow-strong);
    }
    .dialog-backdrop{ position:fixed; inset:0; background:rgba(20,40,80,.28); backdrop-filter:blur(4px); display:none; align-items:center; justify-content:center; z-index:25; }
    .dialog{ width:min(580px, 92vw); background: linear-gradient(180deg, rgba(255,255,255,.98), rgba(248,251,255,.98)); border:1px solid rgba(15, 40, 90, .12); border-radius:18px; padding:16px; box-shadow: var(--shadow-strong)}
    .dialog h3{ margin:0 0 10px; text-shadow:none}
    .form{ display:grid; grid-template-columns:1fr 1fr; gap:12px }
    .form .full{ grid-column:1/-1 }
    label{ font-size:12px; color:var(--muted) }
    input[type="text"], textarea, input[type="number"]{
      width:100%; padding:10px 12px; border-radius:12px; border:1px solid rgba(15, 40, 90, .12); background:rgba(255,255,255,.9); color:#0b1b33; outline:none;
    }
    textarea{ min-height:84px; resize:vertical }
    .uploader{ display:flex; gap:10px; align-items:center }
    .uploader input{ display:block }
    .preview{ width:60px; height:60px; border-radius:50%; border:2px dashed rgba(31,111,235,.25); display:grid; place-items:center; color:var(--muted); font-size:12px; overflow:hidden }
    .preview img{ width:100%; height:100%; object-fit:cover }
    .dlg-actions{ display:flex; justify-content:flex-end; gap:10px; margin-top:12px }
    .btn{ padding:10px 14px; border-radius:12px; border:1px solid rgba(15, 40, 90, .12); cursor:pointer; font-weight:700 }
    .btn.secondary{ background:rgba(255,255,255,.9); color:#0b1b33 }
    .btn.primary{ background: linear-gradient(90deg, var(--primary-strong), var(--accent)); color:#fff; box-shadow:0 10px 20px rgba(31,111,235,.25) }
    .btn.primary:hover{ box-shadow: var(--hover-shadow); }
    .wm{ position:fixed; inset:0; pointer-events:none; z-index:0; opacity:.06; background-image: repeating-linear-gradient( 45deg, transparent 0 40px, rgba(31,111,235,.25) 40px 41px ), repeating-linear-gradient( -45deg, transparent 0 40px, rgba(42,168,255,.22) 40px 41px ); }
    .site-footer{
      max-width:1200px;
      margin:6px auto 18px;
      padding:0 20px;
    }
    .brand-footer{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:6px;
      background: transparent;
      border:none;
      border-radius:0;
      padding:6px 0;
      box-shadow: none;
      color:#6b7a92;
      font-size:12px;
      text-align:center;
    }
    .brand-footer .logo{
      width:auto;
      max-width:120px;
      height:24px;
      border-radius:6px;
      overflow:hidden;
      border:1px solid rgba(15, 40, 90, .12);
      background:#fff;
      padding:2px 6px;
      display:flex;
      align-items:center;
    }
    .brand-footer .logo img{ width:auto; height:100%; object-fit:contain; display:block; }
    .brand-footer .text{ display:flex; flex-direction:column; gap:2px; align-items:center; }
    .brand-footer .name{ font-weight:700; font-size:12px; color:#4f6380; }
    .brand-footer .desc{ font-size:11px; color:#7b8aa3; }
    .brand-footer .copy{ font-size:11px; color:#7b8aa3; white-space:nowrap; }
    @media (max-width:600px){
      .brand-footer{ flex-direction:column; align-items:center; }
    }
    .no-select{ user-select:none }
    .no-select input, .no-select textarea{ user-select:text }
    .nav-main-btn{
      color:#0b1b33 !important;
      font-weight:800;
      padding:10px 20px;
      border-radius:14px;
      background: #ffffff;
      box-shadow: 0 16px 30px rgba(15, 40, 90, .22);
      border:1px solid rgba(15, 40, 90, .22);
      position:relative;
      overflow:hidden;
      text-shadow: none;
      transition: transform .42s cubic-bezier(.22,1,.36,1), box-shadow .42s cubic-bezier(.22,1,.36,1), border-color .34s cubic-bezier(.22,1,.36,1), background .34s cubic-bezier(.22,1,.36,1);
    }
    .nav-main-btn:hover{
      transform: translateY(-1px);
      box-shadow: var(--hover-shadow);
    }
    .nav-main-btn::after{
      content:"";
      position:absolute;
      inset:0;
      background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,.45), transparent 70%);
      transform: translateX(-120%);
      transition: .6s ease;
    }
    .nav-main-btn:hover::after{ transform: translateX(120%); }
    .brand-logo {
      height: 40px;
      background: transparent;
      filter: drop-shadow(0 6px 14px rgba(31,111,235,.25));
    }
    .marquee-wrap {
      width: 100%;
      overflow: hidden;
      background: linear-gradient(90deg, #2b6fe9, #4aa3ff);
      border-radius: 10px;
      padding: 6px 10px 6px 58px;
      box-shadow: 0 10px 22px rgba(31,111,235,.2);
      border:1px solid rgba(15, 40, 90, .08);
      display:flex;
      align-items:center;
      gap:8px;
      min-height:40px;
      position:relative;
    }
    .marquee-wrap::before{
      content:"🔥";
      position:absolute;
      left:0; top:0; bottom:0;
      width:50px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:20px;
      background: linear-gradient(135deg, #ff4d4d, #ff8a3d);
      border-radius:10px;
      z-index:1;
    }
    .marquee-wrap.no-badge{
      padding: 2px 10px 2px 50px;
      min-height:28px;
    }
    .marquee-wrap.no-badge::before{
      content:"🔥";
      width:44px;
      font-size:16px;
    }
    .marquee-wrap.compact{ margin-top:6px; }
    .marquee {
      display: inline-flex;
      align-items: center;
      white-space: nowrap;
      animation: marqueeMove 12s linear infinite;
      padding-left: 6px;
      z-index:2;
    }
    .marquee-text {
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      letter-spacing: .5px;
      text-shadow: 0 1px 0 rgba(0,0,0,.2), 0 6px 16px rgba(0,0,0,.18);
    }
    .icon-ticker{
      margin-top:4px;
      margin-bottom:2px;
      background: rgba(255,255,255,.92);
      border:1px solid rgba(15, 40, 90, .08);
      border-radius:14px;
      box-shadow: 0 10px 24px rgba(31,111,235,.16);
      padding:10px 12px;
      overflow:hidden;
      position:relative;
      touch-action: pan-y;
    }
    .icon-ticker .ticker-status{
      position:absolute;
      right:10px; top:6px;
      background: rgba(0,0,0,.45);
      color:#fff;
      font-size:11px;
      padding:2px 6px;
      border-radius:8px;
      opacity:0;
      transition: opacity .2s ease;
      pointer-events:none;
    }
    .icon-ticker.paused .ticker-status{ opacity:1; }
    .icon-ticker.compact{ margin-top:6px; margin-bottom:6px; }
    .icon-track{
      display:flex;
      gap:14px;
      align-items:center;
      will-change: transform;
    }
    .icon-item{
      flex:0 0 auto;
      width:52px;
      height:52px;
      border-radius:50%;
      background: linear-gradient(180deg, rgba(255,255,255,.95), rgba(243,248,255,.95));
      border:1px solid rgba(15, 40, 90, .1);
      box-shadow: 0 8px 18px rgba(31,111,235,.14);
      display:grid;
      place-items:center;
      cursor:pointer;
      transition: transform .2s ease, box-shadow .2s ease;
    }
    .icon-item:hover{
      transform: translateY(-2px);
      box-shadow: 0 12px 22px rgba(31,111,235,.2);
    }
    .icon-item img{
      width:100%;
      height:100%;
      object-fit:cover;
      border-radius:50%;
    }
    @keyframes marqueeMove {
      0% { transform: translateX(100%); }
      100% { transform: translateX(-100%); }
    }

    // ===== 粒子背景 =====
    (function(){
      var c = document.getElementById('bg-particles');
      var d = c.getContext('2d');
      var W = c.width = innerWidth, H = c.height = innerHeight;
      var prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      var isMobile = window.matchMedia('(max-width: 768px)').matches;
      var memory = Number(navigator.deviceMemory || 4);
      var N = prefersReduced ? 18 : (isMobile ? 36 : (memory <= 2 ? 48 : 80));
      var P = [];
      function rnd(n){ return Math.random() * (n || 1); }
      function init(){
        P.length = 0;
        for(var i = 0; i < N; i++){
          P.push({
            x: rnd(W), y: rnd(H),
            vx: (rnd(1) - .5) * 0.6,
            vy: (rnd(1) - .5) * 0.6,
            r: rnd(1.4) + 0.6
          });
        }
      }
      function tick(){
        d.clearRect(0, 0, W, H);
        for(var p, i = 0; i < N; i++){
          p = P[i];
          p.x += p.vx; p.y += p.vy;
          if(p.x < 0 || p.x > W) p.vx *= -1;
          if(p.y < 0 || p.y > H) p.vy *= -1;
          d.beginPath();
          d.fillStyle = 'rgba(31,111,235,.45)';
          d.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          d.fill();
        }
        for(var i = 0; i < N; i++){
          for(var j = i + 1; j < N; j++){
            var a = P[i], b = P[j];
            var dx = a.x - b.x, dy = a.y - b.y;
            var dist2 = dx * dx + dy * dy;
            var max = 140 * 140;
            if(dist2 < max){
              var alpha = 1 - dist2 / max;
              d.strokeStyle = 'rgba(31,111,235,' + (alpha * 0.18) + ')';
              d.lineWidth = 1;
              d.beginPath();
              d.moveTo(a.x, a.y);
              d.lineTo(b.x, b.y);
              d.stroke();
            }
          }
        }
        requestAnimationFrame(tick);
      }
      addEventListener('resize', function(){ W = c.width = innerWidth; H = c.height = innerHeight; init(); });
      init(); tick();
    })();

    // ===== 轮播图 =====
    function initCarousel(images, linkIds, linkExp, linkSig, linkUrls){
      var slides = document.getElementById('slides');
      var dotsWrap = document.getElementById('dots');
      var prev = document.getElementById('prev');
      var next = document.getElementById('next');
      if(!slides || !dotsWrap) return;
      slides.innerHTML = images.map(function(src, i){
        var urlAttr = (linkUrls && linkUrls[i]) ? ' data-link-url="' + linkUrls[i] + '"' : '';
        return '<div class="slide"><a class="slide-link" href="#" data-link-type="carousel" data-link-id="' + (linkIds && linkIds[i] !== undefined ? linkIds[i] : i) + '" data-link-exp="' + (linkExp && linkExp[i] ? linkExp[i] : '') + '" data-link-sig="' + (linkSig && linkSig[i] ? linkSig[i] : '') + '"' + urlAttr + ' rel="noopener"><img ' + (i === 0 ? 'src="' + src + '" fetchpriority="high" loading="eager"' : 'data-src="' + src + '" loading="lazy"') + ' decoding="async" alt="slide-' + (i + 1) + '" width="1200" height="420"></a></div>';
      }).join('');
      var items = [].slice.call(slides.children);
      var idx = 0, timer = null;
      function ensureImage(i){
        var slide = items[i];
        if(!slide) return;
        var img = slide.querySelector('img');
        if(img && !img.getAttribute('src')){
          var src = img.getAttribute('data-src');
          if(src) img.setAttribute('src', src);
        }
      }
      function renderDots(){
        dotsWrap.innerHTML = '';
        items.forEach(function(_, i){
          var s = document.createElement('span');
          s.className = 'dot' + (i === idx ? ' active' : '');
          s.addEventListener('click', function(){ go(i); });
          dotsWrap.appendChild(s);
        });
      }
      function go(i){
        idx = (i + items.length) % items.length;
        slides.style.transform = 'translateX(-' + (idx * 100) + '%)';
        ensureImage(idx);
        ensureImage((idx + 1) % items.length);
        renderDots();
      }
      function auto(){
        timer && clearInterval(timer);
        timer = setInterval(function(){ go(idx + 1); }, 5000);
      }
      prev && prev.addEventListener('click', function(){ go(idx - 1); auto(); });
      next && next.addEventListener('click', function(){ go(idx + 1); auto(); });
      slides.addEventListener('mouseenter', function(){ clearInterval(timer); });
      slides.addEventListener('mouseleave', auto);
      go(0); auto();
    }

    // ===== 图标滚动 =====
    function initIconTicker(items){
      var wrap = document.getElementById('iconTicker');
      var track = document.getElementById('iconTrack');
      var status = document.getElementById('tickerStatus');
      if(!wrap || !track) return;
      var source = (items || []).map(function(it, idx){
        var urlAttr = it.url ? ' data-link-url="' + it.url + '"' : '';
        return '<a class="icon-item" href="#" data-link-type="icon" data-link-id="' + (it.linkId !== undefined ? it.linkId : idx) + '" data-link-exp="' + (it.linkExp || '') + '" data-link-sig="' + (it.linkSig || '') + '"' + urlAttr + ' rel="noopener"><img src="' + it.icon + '" alt="' + it.name + '" loading="lazy" decoding="async"></a>';
      }).join('');
      if(!source){ track.innerHTML = ''; return; }
      track.innerHTML = source;
      var unitWidth = Math.max(track.scrollWidth, 1);
      var repeat = Math.max(2, Math.ceil((wrap.clientWidth * 3) / unitWidth));
      track.innerHTML = new Array(repeat).fill(source).join('');
      var speed = 0.42;
      var canHoverPause = window.matchMedia('(hover: hover)').matches;
      var pos = 0, hoverPaused = false, dragging = false, inertia = 0;
      var startX = 0, startPos = 0;
      function norm(v){ return ((v % unitWidth) + unitWidth) % unitWidth; }
      function draw(){ track.style.transform = 'translateX(-' + norm(pos) + 'px)'; }
      function updateStatus(){ if(status) status.textContent = (hoverPaused || dragging) ? '暂停' : '播放'; }
      function tickAnim(){
        if(!hoverPaused && !dragging){
          if(Math.abs(inertia) > 0.02){ pos += inertia; inertia *= 0.92; }
          else { inertia = 0; pos += speed; }
          draw();
        }
        requestAnimationFrame(tickAnim);
      }
      if(canHoverPause){
        wrap.addEventListener('mouseenter', function(){ hoverPaused = true; wrap.classList.add('paused'); updateStatus(); });
        wrap.addEventListener('mouseleave', function(){ hoverPaused = false; if(!dragging) wrap.classList.remove('paused'); updateStatus(); });
      }
      wrap.addEventListener('pointerdown', function(e){
        dragging = true; inertia = 0; startX = e.clientX; startPos = pos;
        wrap.classList.add('paused'); updateStatus();
        wrap.setPointerCapture(e.pointerId);
      });
      wrap.addEventListener('pointermove', function(e){
        if(!dragging) return;
        var dx = e.clientX - startX;
        pos = startPos - dx; inertia = -dx * 0.12;
        draw();
      });
      function endDrag(e){
        if(!dragging) return;
        dragging = false; if(!hoverPaused) wrap.classList.remove('paused');
        updateStatus();
        try{ wrap.releasePointerCapture(e.pointerId); }catch(_){}
      }
      wrap.addEventListener('pointerup', endDrag);
      wrap.addEventListener('pointercancel', endDrag);
      draw(); updateStatus(); tickAnim();
    }

    // ===== 星级评分 SVG =====
    function starSVG(filled){
      return '<svg viewBox="0 0 24 24" aria-hidden="true" width="10" height="10"><path d="M12 .587l3.668 7.431 8.2 1.193-5.934 5.786 1.401 8.168L12 18.896l-7.335 3.869 1.401-8.168L.132 9.211l8.2-1.193z" fill="currentColor"' + (filled ? '' : ' opacity=".28"') + '></path></svg>';
    }
    function buildRating(r){
      var full = Math.floor(r / 2);
      var stars = '';
      for(var i = 0; i < 5; i++) stars += starSVG(i < full);
      return '<div class="rating"><div class="stars">' + stars + '</div><div class="score">' + r.toFixed(1) + '分</div></div>';
    }

    // ===== 渲染卡片 =====
    function renderCards(cards){
      var grid = document.getElementById('cardGrid');
      if(!grid) return;
      grid.innerHTML = '';
      var sorted = cards.slice().sort(function(a, b){
        var ae = (a.enabled !== false) ? 0 : 1;
        var be = (b.enabled !== false) ? 0 : 1;
        if(ae !== be) return ae - be;
        var ao = Number(a.order || 999999);
        var bo = Number(b.order || 999999);
        return ao - bo;
      }).filter(function(c){ return c.enabled !== false; });
      var cols = 4;
      for(var i = 0; i < sorted.length; i += cols){
        var row = document.createElement('div');
        row.className = 'card-row';
        sorted.slice(i, i + cols).forEach(function(it, idx){
          var card = document.createElement('a');
          card.className = 'card';
          card.style.setProperty('--stagger', Math.min(i + idx, 14) * 55 + 'ms');
          card.href = '#';
          card.dataset.linkType = 'card';
          card.dataset.linkId = (it.linkId !== undefined ? it.linkId : (i + idx));
          card.dataset.linkExp = it.linkExp || '';
          card.dataset.linkSig = it.linkSig || '';
          if(it.url) card.dataset.linkUrl = it.url;
          card.rel = 'noopener';
          var avatar = document.createElement('img');
          avatar.className = 'avatar';
          avatar.alt = it.title || '';
          avatar.src = it.avatar || '';
          avatar.loading = 'lazy';
          avatar.decoding = 'async';
          var title = document.createElement('div');
          title.className = 'title';
          title.textContent = it.title || '';
          var badgeText = (it.badge && it.badge.text) ? it.badge.text : (it.badgeText || '');
          var badgeShow = (it.badge && it.badge.show === false) ? false : !!badgeText;
          if(badgeShow){
            var badge = document.createElement('div');
            badge.className = 'rec-badge';
            var badgeSpan = document.createElement('span');
            badgeSpan.className = 'rec-badge-text';
            badgeSpan.textContent = badgeText;
            badge.appendChild(badgeSpan);
            card.appendChild(badge);
          }
          card.appendChild(avatar);
          card.appendChild(title);
          if(it.desc){
            var desc = document.createElement('div');
            desc.className = 'desc-text';
            desc.textContent = it.desc;
            card.appendChild(desc);
          }
          if(it.rating !== undefined){
            var ratingDiv = document.createElement('div');
            ratingDiv.innerHTML = buildRating(it.rating);
            card.appendChild(ratingDiv);
          }
          row.appendChild(card);
        });
        grid.appendChild(row);
      }
    }

    // ===== 渲染图标网格 (热门游戏 / 工具) =====
    function renderIconGrid(items){
      var grid = document.getElementById('cardGrid');
      if(!grid) return;
      grid.innerHTML = '';
      var cols = 4;
      for(var i = 0; i < items.length; i += cols){
        var row = document.createElement('div');
        row.className = 'card-row';
        items.slice(i, i + cols).forEach(function(it, idx){
          var card = document.createElement('a');
          card.className = 'card';
          card.style.setProperty('--stagger', Math.min(i + idx, 14) * 55 + 'ms');
          card.href = '#';
          card.dataset.linkType = (it.linkType || 'icon');
          card.dataset.linkId = (it.linkId !== undefined ? it.linkId : (i + idx));
          card.dataset.linkExp = it.linkExp || '';
          card.dataset.linkSig = it.linkSig || '';
          if(it.url) card.dataset.linkUrl = it.url;
          card.rel = 'noopener';
          var avatar = document.createElement('img');
          avatar.className = 'avatar';
          avatar.alt = it.name || '';
          avatar.src = it.icon || '';
          avatar.loading = 'lazy';
          avatar.decoding = 'async';
          var title = document.createElement('div');
          title.className = 'title';
          title.textContent = it.name || '';
          card.appendChild(avatar);
          card.appendChild(title);
          row.appendChild(card);
        });
        grid.appendChild(row);
      }
    }

    // ===== 应用数据 =====
    function applyData(data){
      var navBtn = document.getElementById('navMainBtn');
      if(navBtn && data.header && data.header.mainButton){
        navBtn.textContent = data.header.mainButton.text || navBtn.textContent;
        navBtn.href = data.header.mainButton.href || navBtn.href;
      }
      var marqueeText = document.getElementById('marqueeText');
      if(marqueeText && data.marqueeText) marqueeText.textContent = data.marqueeText;
      window.__lastData = data;
      initCarousel(
        data.carouselImages || [],
        data.carouselLinkIds || [],
        data.carouselLinkExp || [],
        data.carouselLinkSig || [],
        data.carouselLinkUrls || []
      );
      initIconTicker(data.iconTicker || []);
      var recommendData = data.cards || [];
      var hotIcons = (data.iconTicker || []).map(function(it){ return Object.assign({}, it, { linkType: 'icon' }); });
      var toolIcons = (data.toolIcons && data.toolIcons.length) ? data.toolIcons.map(function(it){ return Object.assign({}, it, { linkType: 'tool' }); }) : [];
      var tabs = document.querySelectorAll('#categoryTabs .tab-btn');
      function setActive(tab){
        tabs.forEach(function(t){ t.classList.toggle('active', t.dataset.tab === tab); });
        if(tab === 'recommend') renderCards(recommendData);
        else if(tab === 'hot') renderIconGrid(hotIcons);
        else renderIconGrid(toolIcons);
      }
      tabs.forEach(function(btn){
        btn.addEventListener('click', function(){ setActive(btn.dataset.tab); });
      });
      setActive('recommend');
    }

    // ===== 固定区域高度同步 =====
    function syncFixedHeight(){
      var fixed = document.getElementById('fixedArea');
      var scroll = document.getElementById('cardsScroll');
      if(!fixed || !scroll) return;
      var h = fixed.offsetHeight;
      scroll.style.top = h + 'px';
    }

    // ===== 链接点击处理：优先跳自定义 url，没有就走卷卷.com签名 =====
    document.addEventListener('click', function(e){
      var a = e.target.closest('a[data-link-type]');
      if(!a) return;
      e.preventDefault();
      var customUrl = a.dataset.linkUrl;
      if(customUrl){
        window.open(customUrl, '_blank');
        return;
      }
      var type = a.dataset.linkType;
      var id = a.dataset.linkId;
      var exp = a.dataset.linkExp;
      var sig = a.dataset.linkSig;
      if(type && id !== undefined && exp && sig){
        window.open('https://卷卷.com/api/link.php?type=' + encodeURIComponent(type) + '&id=' + encodeURIComponent(id) + '&exp=' + encodeURIComponent(exp) + '&sig=' + encodeURIComponent(sig), '_blank');
      }
    });

    // ===== 初始化 =====
    applyData(API_DATA);
    requestAnimationFrame(syncFixedHeight);

    addEventListener('resize', function(){
      syncFixedHeight();
      if(window.__lastData){
        var active = document.querySelector('#categoryTabs .tab-btn.active');
        var tab = active ? active.dataset.tab : 'recommend';
        if(tab === 'recommend') renderCards(window.__lastData.cards || []);
        else {
          var hotIcons = (window.__lastData.iconTicker || []).map(function(it){ return Object.assign({}, it, { linkType: 'icon' }); });
          var toolIcons = (window.__lastData.toolIcons && window.__lastData.toolIcons.length) ? window.__lastData.toolIcons.map(function(it){ return Object.assign({}, it, { linkType: 'tool' }); }) : [];
          renderIconGrid(tab === 'hot' ? hotIcons : toolIcons);
        }
      }
    });

    // ===== 防复制 =====
    document.addEventListener('contextmenu', function(e){
      if(!(e.target instanceof HTMLInputElement) && !(e.target instanceof HTMLTextAreaElement)) e.preventDefault();
    });
    document.addEventListener('keydown', function(e){
      var k = e.key.toLowerCase();
      if((e.ctrlKey || e.metaKey) && ['c','u','s','p'].includes(k)) e.preventDefault();
      if(e.key === 'F12') e.preventDefault();
      if((e.ctrlKey || e.metaKey) && e.shiftKey && ['i','j','c'].includes(k)) e.preventDefault();
    });
    document.addEventListener('dragstart', function(e){
      if(e.target && (e.target.tagName === 'IMG' || e.target.tagName === 'A')) e.preventDefault();
    });

    // ===== 新增卡片对话框 =====
    (function(){
      var fabBtn = document.getElementById('fabBtn');
      var dlg = document.getElementById('dlg');
      var cancel = document.getElementById('cancel');
      if(fabBtn && dlg){
        fabBtn.addEventListener('click', function(){ dlg.style.display = 'flex'; });
        cancel.addEventListener('click', function(){ dlg.style.display = 'none'; });
        dlg.addEventListener('click', function(e){ if(e.target === dlg) dlg.style.display = 'none'; });
        document.getElementById('save').addEventListener('click', function(){
          var title = document.getElementById('title').value;
          var rating = document.getElementById('rating').value;
          var desc = document.getElementById('desc').value;
          if(title){
            var grid = document.getElementById('cardGrid');
            var firstRow = grid.querySelector('.card-row');
            if(!firstRow){
              firstRow = document.createElement('div');
              firstRow.className = 'card-row';
              grid.appendChild(firstRow);
            }
            var card = document.createElement('a');
            card.className = 'card';
            card.href = '#';
            var hrefInput = document.getElementById('href');
            if(hrefInput && hrefInput.value) card.dataset.linkUrl = hrefInput.value;
            card.rel = 'noopener';
            var avatar = document.createElement('img');
            avatar.className = 'avatar';
            avatar.alt = title;
            var preview = document.getElementById('preview');
            var fileImg = preview.querySelector('img');
            if(fileImg) avatar.src = fileImg.src;
            else avatar.src = './images/ng28logo.webp';
            avatar.loading = 'lazy';
            var titleDiv = document.createElement('div');
            titleDiv.className = 'title';
            titleDiv.textContent = title;
            card.appendChild(avatar);
            card.appendChild(titleDiv);
            if(desc){
              var descDiv = document.createElement('div');
              descDiv.className = 'desc-text';
              descDiv.textContent = desc;
              card.appendChild(descDiv);
            }
            if(rating){
              var ratingDiv = document.createElement('div');
              ratingDiv.innerHTML = buildRating(parseFloat(rating));
              card.appendChild(ratingDiv);
            }
            if(firstRow.children.length >= 4){
              var newRow = document.createElement('div');
              newRow.className = 'card-row';
              newRow.appendChild(card);
              grid.appendChild(newRow);
            } else {
              firstRow.appendChild(card);
            }
            dlg.style.display = 'none';
            document.getElementById('title').value = '';
            document.getElementById('desc').value = '';
            document.getElementById('href').value = '';
            document.getElementById('preview').innerHTML = '<span>预览</span>';
          }
        });
        document.getElementById('file').addEventListener('change', function(e){
          var file = e.target.files[0];
          if(!file) return;
          var reader = new FileReader();
          reader.onload = function(ev){
            var preview = document.getElementById('preview');
            preview.innerHTML = '<img src="' + ev.target.result + '" alt="preview">';
          };
          reader.readAsDataURL(file);
        });
      }
    })();
  </script>
